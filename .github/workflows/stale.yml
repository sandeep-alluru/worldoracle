name: Stale issues and PRs

on:
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 08:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. If it is still relevant,
            please leave a comment and it will be kept open. Otherwise it will
            be closed in 7 days.
          stale-pr-message: >
            This PR has been inactive for 60 days. Please rebase and update
            it, or it will be closed in 7 days.
          close-issue-message: "Closing due to inactivity. Please reopen if still relevant."
          close-pr-message: "Closing due to inactivity. Please reopen with a rebased branch."
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: "pinned,security,enhancement,help wanted"
          exempt-pr-labels: "pinned,security"
